<div class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <div>
      <h2 class="fw-bold text-dark mb-0">Meus Eventos</h2>
      <p class="text-muted small mb-0">Faça a gestão de todos os seus eventos ativos.</p>
    </div>
    
    <button class="btn btn-primary shadow-sm px-4 fw-bold" routerLink="/cadastro-evento">
      + Novo Evento
    </button>
  </div>

  <hr class="mb-4">

  <div class="row">
    <div class="col-12 text-center py-5 bg-light rounded" *ngIf="eventos.length === 0">
      <div class="text-muted mb-2" style="font-size: 2.5rem;">📅</div>
      <h4 class="fw-bold text-secondary">Nenhum evento registado</h4>
      <p class="text-muted">Clique em "+ Novo Evento" para criar o seu primeiro evento.</p>
    </div>

    <div class="col-md-4 mb-4" *ngFor="let evento of eventos">
      <div class="card h-100 shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="bg-primary" style="height: 6px;"></div>
        <div class="card-body">
          <h5 class="card-title fw-bold text-dark">{{ evento.nome }}</h5>
          <p class="card-text text-muted small mb-3">
            <i class="bi bi-geo-alt me-1"></i> {{ evento.local || 'Local não definido' }}
          </p>
          <p class="card-text text-secondary" style="font-size: 0.9rem;">
            {{ evento.descricao }}
          </p>
        </div>
        <div class="card-footer bg-white border-0 pt-0 pb-3 d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm flex-fill">Editar</button>
          <button class="btn btn-outline-danger btn-sm flex-fill">Excluir</button>
        </div>
      </div>
    </div>
  </div>
</div>
