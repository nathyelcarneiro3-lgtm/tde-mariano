<div class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <div>
      <h2 class="fw-bold text-dark mb-0">Meus Eventos</h2>
      <p class="text-muted small mb-0">Faça a gestão de todos os eventos registados no sistema.</p>
    </div>
    <a routerLink="/cadastro-evento" class="btn btn-primary shadow-sm rounded-3 px-4 py-2 fw-bold">
      + Novo Evento
    </a>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle mb-0 custom-table">
          
          <thead class="bg-light">
            <tr>
              <th class="text-secondary small fw-bold px-4 py-3">NOME DO EVENTO</th>
              <th class="text-secondary small fw-bold py-3">DATA</th>
              <th class="text-secondary small fw-bold py-3">LOCALIZAÇÃO</th>
              <th class="text-secondary small fw-bold py-3 text-center">AÇÕES</th>
            </tr>
          </thead>
          
          <tbody>
            <tr *ngFor="let evento of eventos">
              <td class="px-4 py-3 fw-semibold text-dark">{{ evento.nome }}</td>
              <td class="py-3 text-muted">{{ evento.data | date:'dd/MM/yyyy HH:mm' }}</td>
              <td class="py-3 text-muted">{{ evento.local }}</td>
              <td class="py-3 text-center">
                <button 
                  class="btn btn-sm btn-outline-danger rounded-3 fw-bold px-3" 
                  (click)="removerEvento(evento.id)" 
                  title="Remover Evento">
                  🗑️ Excluir
                </button>
              </td>
            </tr>

            <tr *ngIf="!eventos || eventos.length === 0">
              <td colspan="4" class="text-center py-5 text-muted bg-white">
                <div style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;">📭</div>
                <h5 class="fw-bold text-dark">Nenhum evento encontrado</h5>
                <p class="small mb-0">Clique no botão "+ Novo Evento" para começar a adicionar.</p>
              </td>
            </tr>
          </tbody>

        </table>
      </div>
    </div>
  </div>
</div>
