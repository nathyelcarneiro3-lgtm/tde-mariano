<div class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <div>
      <h2 class="fw-bold text-dark mb-0">Meus Eventos</h2>
      <p class="text-muted small mb-0">Faça a gestão de todos os seus eventos ativos.</p>
    </div>
    
    <button class="btn btn-primary shadow-sm px-4 fw-bold" routerLink="/cadastro-evento">
      + Novo Evento
    </button>
  </div>

  <hr class="mb-4">

  <div class="mt-4 table-responsive bg-white shadow-sm rounded">
  <table class="table table-hover align-middle mb-0">
    <thead class="table-light">
      <tr>
        <th style="padding: 1rem;">ID</th>
        <th style="padding: 1rem;">Nome do Evento</th>
        <th style="padding: 1rem;">Local</th>
        <th style="padding: 1rem;">Descrição</th>
        <th style="padding: 1rem; text-align: center;">Ações</th>
      </tr>
    </thead>
   <tbody>
  <tr *ngFor="let evento of eventos">
    <td>{{ evento.id }}</td>
    <td>{{ evento.nome }}</td> <td>{{ evento.dt_inicio }}</td> <td>{{ evento.dt_fim }}</td>
    <td style="text-align: center;">
      <button class="btn btn-sm btn-outline-primary me-2" (click)="editarEvento(evento.id)">Editar</button>
      <button class="btn btn-sm btn-outline-danger" (click)="excluirEvento(evento.id)">Excluir</button>
    </td>
  </tr>
  
  <tr *ngIf="eventos.length === 0">
    <td colspan="5" class="text-center py-4 text-muted">
      Nenhum evento encontrado no banco de dados.
    </td>
  </tr>
</tbody>
  </table>
</div>
