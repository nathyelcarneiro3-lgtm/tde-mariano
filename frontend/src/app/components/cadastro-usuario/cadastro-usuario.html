<div class="container login-wrapper mt-4">
  <div class="login-box flex-row-reverse"> <div class="login-side-visual d-none d-md-flex" style="background: linear-gradient(135deg, #0b1120 0%, #1e293b 100%);">
      <div style="font-size: 3rem; margin-bottom: 20px;">🚀</div>
      <h2 class="fw-bold mb-3 text-warning">Junte-se a Nós</h2>
      <p class="text-light opacity-75" style="font-size: 0.95rem;">
        Crie a sua conta gratuita para poder inscrever-se em minicursos e palestras exclusivas.
      </p>
    </div>

    <div class="login-side-form">
      <div class="mb-4 text-center">
        <h3 class="fw-bold text-dark mb-1">Criar Conta</h3>
        <p class="text-muted small">Preencha os seus dados abaixo</p>
      </div>

      <form (ngSubmit)="cadastrar()">
        
       <div class="mb-3">
          <label for="cpf" class="form-label small fw-bold text-secondary">CPF</label>
          <input type="text" id="cpf" class="form-control custom-input" [(ngModel)]="novoUsuario.cpf" name="cpf" placeholder="000.000.000-00" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label small fw-bold text-secondary">E-mail</label>
          <input type="email" id="email" class="form-control custom-input" [(ngModel)]="novoUsuario.email" name="email" placeholder="nathyel@email.com" required>
        </div>

        <div class="mb-4">
          <label for="senha" class="form-label small fw-bold text-secondary">Palavra-passe</label>
          <input type="password" id="senha" class="form-control custom-input" [(ngModel)]="novoUsuario.senha" name="senha" placeholder="Crie uma palavra-passe forte" required>
        </div>

        <div class="d-grid mt-4 gap-3">
          <button type="submit" class="btn custom-btn shadow-sm">
            Registar Utilizador
          </button>
          <a routerLink="/login" class="btn btn-light fw-bold" style="border: 2px solid #e2e8f0; color: #475569;">
            Já tenho uma conta
          </a>
        </div>

      </form>
    </div>

  </div>
</div>
