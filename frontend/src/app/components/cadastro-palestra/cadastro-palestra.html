<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="mb-4 text-center">
        <h2 class="fw-bold mb-2">{{ isEdit ? 'Editar Palestra' : 'Nova Palestra' }}</h2>
        <p class="text-muted">Preencha os dados da palestra e do palestrante.</p>
      </div>

      <div *ngIf="carregando && isEdit" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2">Carregando...</p>
      </div>

      <div *ngIf="erroMsg" class="alert alert-danger rounded-3 mb-3">
        <strong>{{ erroMsg }}</strong>
      </div>

      <div class="card shadow-sm border-0" style="border-radius:16px" *ngIf="!carregando || !isEdit">
        <div class="card-body p-4 p-md-5">
          <form (ngSubmit)="f.form.valid && salvar()" #f="ngForm">

            <div class="mb-4">
              <label class="form-label fw-bold text-secondary small">Evento <span class="text-danger">*</span></label>
              <select class="form-select form-select-lg bg-light border-0"
                      [(ngModel)]="palestra.id_evento" name="id_evento" required>
                <option [ngValue]="null" disabled>Selecione um evento</option>
                <option *ngFor="let e of eventos" [value]="e.id">{{ e.nome }}</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-secondary small">Nome da Palestra <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-lg bg-light border-0"
                     [(ngModel)]="palestra.nome" name="nome" required
                     placeholder="Ex: Inteligência Artificial na Prática">
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-secondary small">Descrição <span class="text-danger">*</span></label>
              <textarea rows="3" class="form-control bg-light border-0"
                        [(ngModel)]="palestra.descricao" name="descricao" required></textarea>
            </div>

            <h5 class="fw-bold mt-4 mb-3">Dados do Palestrante</h5>

            <div class="mb-3">
              <label class="form-label fw-bold text-secondary small">Nome do Palestrante <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-lg bg-light border-0"
                     [(ngModel)]="palestra.nome_palestrante" name="nome_palestrante" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-secondary small">Mini Currículo <span class="text-danger">*</span></label>
              <textarea rows="2" class="form-control bg-light border-0"
                        [(ngModel)]="palestra.minicurriculo_palestrante" name="minicurriculo_palestrante" required
                        placeholder="Breve descrição do palestrante..."></textarea>
            </div>

            <h5 class="fw-bold mt-4 mb-3">Data e Horário</h5>

            <div class="row mb-5">
              <div class="col-md-4 mb-3 mb-md-0">
                <label class="form-label fw-bold text-secondary small">Data <span class="text-danger">*</span></label>
                <input type="date" class="form-control form-control-lg bg-light border-0"
                       [(ngModel)]="palestra.dt_palestra" name="dt_palestra" required>
              </div>
              <div class="col-md-4 mb-3 mb-md-0">
                <label class="form-label fw-bold text-secondary small">Início <span class="text-danger">*</span></label>
                <input type="time" class="form-control form-control-lg bg-light border-0"
                       [(ngModel)]="palestra.horario_inicio_palestra" name="horario_inicio" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold text-secondary small">Fim <span class="text-danger">*</span></label>
                <input type="time" class="form-control form-control-lg bg-light border-0"
                       [(ngModel)]="palestra.horario_fim_palestra" name="horario_fim" required>
              </div>
            </div>

            <hr class="mb-4">
            <div class="d-flex justify-content-end gap-3">
              <button type="button" routerLink="/lista-palestras" class="btn btn-light fw-bold px-4">Cancelar</button>
              <button type="submit" class="btn btn-primary fw-bold px-4" [disabled]="f.invalid || carregando">
                <span *ngIf="carregando" class="spinner-border spinner-border-sm me-1" role="status"></span>
                {{ isEdit ? 'Guardar' : 'Cadastrar' }}
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
