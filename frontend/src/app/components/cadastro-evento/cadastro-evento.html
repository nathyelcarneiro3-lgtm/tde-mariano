<div style="max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Cadastrar Novo Evento</h2>
  
  <form (ngSubmit)="cadastrar()">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Nome do Evento:</label>
      <input type="text" [(ngModel)]="novoEvento.nome" name="nome" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Data e Hora:</label>
      <input type="datetime-local" [(ngModel)]="novoEvento.data" name="data" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Localização:</label>
      <input type="text" [(ngModel)]="novoEvento.local" name="local" required style="width: 100%; padding: 8px;">
    </div>

    <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Salvar Evento
    </button>
  </form>
</div>
