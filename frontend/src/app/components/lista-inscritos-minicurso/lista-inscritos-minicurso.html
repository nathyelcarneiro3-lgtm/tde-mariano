<div class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <div>
      <h2 class="fw-bold mb-0">Inscritos no Minicurso</h2>
      <p class="text-muted small mb-0">Lista de participantes inscritos neste minicurso.</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" routerLink="/lista-minicursos">← Voltar</button>
      <button class="btn btn-outline-secondary" (click)="carregar()">Atualizar</button>
    </div>
  </div>
  <hr class="mb-4">

  <div *ngIf="carregando" class="text-center py-5">
    <div class="spinner-border text-warning" role="status"></div>
    <p class="mt-3 text-muted">Carregando inscritos...</p>
  </div>

  <div *ngIf="erroMsg && !carregando" class="alert alert-danger rounded-3">
    <strong>{{ erroMsg }}</strong>
    <div class="mt-2"><button class="btn btn-sm btn-outline-danger" (click)="carregar()">Tentar novamente</button></div>
  </div>

  <div class="table-responsive bg-white shadow-sm rounded border" *ngIf="!carregando && !erroMsg">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th style="padding:1rem">CPF</th>
          <th style="padding:1rem">Nome</th>
          <th style="padding:1rem">E-mail</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let i of inscritos">
          <td style="padding:1rem"><code>{{ i.cpf || '—' }}</code></td>
          <td style="padding:1rem">{{ i.nome || '—' }}</td>
          <td style="padding:1rem">{{ i.email || '—' }}</td>
        </tr>
        <tr *ngIf="inscritos.length === 0">
          <td colspan="3" class="text-center py-5 text-muted">Nenhum inscrito neste minicurso.</td>
        </tr>
      </tbody>
    </table>
  </div>
  <p class="text-muted small mt-3" *ngIf="!carregando && inscritos.length > 0">
    Total: {{ inscritos.length }} inscrito(s).
  </p>
</div>
